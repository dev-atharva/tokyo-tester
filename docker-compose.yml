services:
  runner:
    build:
      context: ./runner-v2
      dockerfile: Dockerfile
    container_name: tokyo-tester-runner
    environment:
      APP_ENV: ${RUNNER_APP_ENV:-production}
      PORT: 8080
      LOG_LEVEL: ${RUNNER_LOG_LEVEL:-info}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      DB_TYPE: ${RUNNER_DB_TYPE:-sqlite}
      DB_PATH: /app/data/cots.db
      DATABASE_URL: ${RUNNER_DATABASE_URL:-}
      DOCKER_HOST: ${RUNNER_DOCKER_HOST:-unix:///var/run/docker.sock}
      TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: ${TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE:-/var/run/docker.sock}
      TESTCONTAINERS_HOST_OVERRIDE: ${TESTCONTAINERS_HOST_OVERRIDE:-host.docker.internal}
      JANITOR_ENABLED: ${JANITOR_ENABLED:-true}
      WORKFLOW_WORKER_ENABLED: ${WORKFLOW_WORKER_ENABLED:-true}
      WORKFLOW_WORKER_CONCURRENCY: ${WORKFLOW_WORKER_CONCURRENCY:-2}
      WORKFLOW_SCENARIO_CONCURRENCY: ${WORKFLOW_SCENARIO_CONCURRENCY:-2}
      WORKFLOW_JOB_LEASE_SECONDS: ${WORKFLOW_JOB_LEASE_SECONDS:-60}
      WORKFLOW_JOB_HEARTBEAT_SECONDS: ${WORKFLOW_JOB_HEARTBEAT_SECONDS:-15}
      WORKFLOW_JOB_MAX_RECOVERIES: ${WORKFLOW_JOB_MAX_RECOVERIES:-3}
      WORKFLOW_EVENT_RETENTION_DAYS: ${WORKFLOW_EVENT_RETENTION_DAYS:-30}
      WORKFLOW_JOB_ENCRYPTION_KEY: ${WORKFLOW_JOB_ENCRYPTION_KEY:?WORKFLOW_JOB_ENCRYPTION_KEY must be set}
    volumes:
      - runner_data:/app/data
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:${CONTAINER_DOCKER_SOCKET_PATH:-/var/run/docker.sock}
    networks:
      - tokyo-tester
    command: ["-migrate"]
    restart: unless-stopped

  ui:
    build:
      context: ./ui-v2
      dockerfile: Dockerfile
    container_name: tokyo-tester-ui
    environment:
      NODE_ENV: production
      PORT: 3000
      COTS_API_BASE_URL: ${COTS_API_BASE_URL:-http://runner:8080}
      DB_TYPE: ${UI_DB_TYPE:-sqlite}
      DB_PATH: /app/data/tokyo-tester-auth.db
      DATABASE_URL: ${UI_DATABASE_URL:-}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET must be set}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
    ports:
      - "3000:3000"
    volumes:
      - ui_data:/app/data
    depends_on:
      runner:
        condition: service_healthy
    networks:
      - tokyo-tester
    command: ["sh", "-c", "bun run db:migrate && bun run start"]
    restart: unless-stopped

networks:
  tokyo-tester:
    name: tokyo-tester
    driver: bridge

volumes:
  runner_data:
  ui_data:
