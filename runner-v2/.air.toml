root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/cots ./cmd/main.go"
bin = "./tmp/cots"
full_bin = "./tmp/cots -migrate"
include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml", "json"]
exclude_dir = ["tmp", "vendor", "data"]
delay = 500
stop_on_error = true
send_interrupt = true
kill_delay = "1s"

[log]
time = true

[misc]
clean_on_exit = true
