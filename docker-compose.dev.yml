services:
  runner:
    build:
      context: ./runner-v2
      dockerfile: Dockerfile
      target: dev
    environment:
      APP_ENV: development
      DB_TYPE: ${RUNNER_DB_TYPE:-sqlite}
      DB_PATH: /app/data/cots.db
      DATABASE_URL: ${RUNNER_DATABASE_URL:-}
      WORKFLOW_WORKER_ENABLED: ${WORKFLOW_WORKER_ENABLED:-true}
      WORKFLOW_WORKER_CONCURRENCY: ${WORKFLOW_WORKER_CONCURRENCY:-2}
      WORKFLOW_SCENARIO_CONCURRENCY: ${WORKFLOW_SCENARIO_CONCURRENCY:-2}
      WORKFLOW_JOB_ENCRYPTION_KEY: ${WORKFLOW_JOB_ENCRYPTION_KEY:-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
    entrypoint: ["air", "-c", ".air.toml"]
    command: []
    volumes:
      - ./runner-v2:/app
      - runner_dev_data:/app/data
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:${CONTAINER_DOCKER_SOCKET_PATH:-/var/run/docker.sock}

  ui:
    build:
      context: ./ui-v2
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
      COTS_API_BASE_URL: ${COTS_API_BASE_URL:-http://runner:8080}
      DB_TYPE: ${UI_DB_TYPE:-sqlite}
      DB_PATH: /app/data/tokyo-tester-auth.db
      DATABASE_URL: ${UI_DATABASE_URL:-}
      AUTH_SECRET: ${AUTH_SECRET:-local-dev-auth-secret}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
    extra_hosts:
      - "host.docker.internal=host-gateway"
    volumes:
      - ./ui-v2:/app
      - /app/node_modules
      - /app/.next
      - ui_dev_data:/app/data
    command: ["sh", "-c", "bun run db:migrate && bun run dev -- --hostname 0.0.0.0"]

volumes:
  runner_dev_data:
  ui_dev_data:
